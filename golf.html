<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golf Master Live - 高爾夫計分</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    
    <style>
        body { 
            /* 注意：這裡的 'bg.jpg' 必須跟你在 GitHub 上傳的圖片檔名一模一樣 */
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('bg.jpg'); 
            background-size: cover; 
            background-position: center;
            background-attachment: fixed; 
            min-height: 100vh; 
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial;
        }

        .glass-card { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(10px); 
            border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .golf-green-btn { background-color: #1b4332; transition: all 0.3s; }
        .golf-green-btn:hover { background-color: #2d6a4f; transform: translateY(-2px); }

        /* 隱藏數字輸入框的上下箭頭 */
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }
    </style>
</head>
<body class="p-4 text-gray-800">

    <div id="setup-screen" class="glass-card p-8 max-w-md mx-auto mt-10 shadow-2xl">
        <h2 class="text-3xl font-black mb-6 text-center text-green-900 border-b-2 border-green-200 pb-2">⛳ 比賽登入</h2>
        <div class="space-y-4">
            <input type="text" id="courseName" class="w-full p-3 border rounded-lg" placeholder="球場名稱">
            <input type="text" id="teamName" class="w-full p-3 border rounded-lg" placeholder="隊伍名稱">
            <input type="text" id="playerName" class="w-full p-3 border rounded-lg" placeholder="您的姓名">
            <input type="password" id="roomPass" class="w-full p-3 border rounded-lg" placeholder="同步密碼 (同組需一致)">
            <button onclick="joinMatch()" class="w-full golf-green-btn text-white py-4 rounded-xl font-bold shadow-lg">進入計分板</button>
        </div>
    </div>

    <div id="score-screen" class="hidden max-w-2xl mx-auto">
        <div class="glass-card p-4 mb-4 flex justify-between items-center sticky top-0 z-50 shadow-lg">
            <div>
                <h1 id="disp-course" class="text-xl font-bold text-green-900"></h1>
                <p id="disp-player" class="text-xs font-bold text-green-700"></p>
            </div>
            <div class="text-center bg-yellow-400 px-5 py-2 rounded-2xl shadow-md">
                <span class="text-[10px] font-black block">TOTAL</span>
                <span id="grand-total" class="text-3xl font-black">0</span>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="glass-card p-5 shadow-md">
                <div class="flex justify-between items-center border-b border-green-200 pb-2 mb-4">
                    <h3 class="font-black text-green-800">OUT (1-9 洞)</h3>
                    <span class="text-sm font-bold bg-green-100 px-2 py-1 rounded">小計: <span id="out-sum">0</span></span>
                </div>
                <div id="out-holes-container" class="space-y-3"></div>
            </div>

            <div class="glass-card p-5 shadow-md">
                <div class="flex justify-between items-center border-b border-green-200 pb-2 mb-4">
                    <h3 class="font-black text-green-800">IN (10-18 洞)</h3>
                    <span class="text-sm font-bold bg-green-100 px-2 py-1 rounded">小計: <span id="in-sum">0</span></span>
                </div>
                <div id="in-holes-container" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <script>
        // 【重要：請在此貼上你的 Firebase 配置】
        const firebaseConfig = {
            apiKey: "你的API_KEY",
            authDomain: "你的專案ID.firebaseapp.com",
            projectId: "你的專案ID",
            storageBucket: "你的專案ID.appspot.com",
            messagingSenderId: "你的SENDER_ID",
            appId: "你的APP_ID"
        };

        // 初始化 Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let matchId = "";
        let myName = "";

        // 登入邏輯
        async function joinMatch() {
            const course = document.getElementById('courseName').value.trim();
            const team = document.getElementById('teamName').value.trim();
            const pass = document.getElementById('roomPass').value.trim();
            myName = document.getElementById('playerName').value.trim();

            if(!course || !team || !pass || !myName) return alert("請填寫完整資訊！");

            matchId = `${course}_${team}_${pass}`;
            
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('score-screen').classList.remove('hidden');
            document.getElementById('disp-course').innerText = course;
            document.getElementById('disp-player').innerText = `選手: ${myName}`;

            initUI();
            startSync();
        }

        // 建立 18 洞 UI
        function initUI() {
            const outBox = document.getElementById('out-holes-container');
            const inBox = document.getElementById('in-holes-container');
            outBox.innerHTML = ''; inBox.innerHTML = '';

            for(let i=1; i<=18; i++) {
                const html = `
                    <div class="flex items-center justify-between bg-white/50 p-3 rounded-xl border border-white/50 shadow-sm">
                        <div class="flex items-center space-x-3">
                            <span class="w-7 h-7 flex items-center justify-center bg-green-800 text-white rounded-full text-xs font-bold">${i}</span>
                            <div class="flex flex-col">
                                <span class="text-[9px] text-gray-500 font-bold uppercase">Par</span>
                                <input type="number" id="par${i}" class="w-8 text-sm font-bold text-blue-700 bg-transparent" value="4" onchange="updateFirebase(${i})">
                            </div>
                        </div>
                        <div class="flex items-center space-x-2">
                            <button onclick="stepScore(${i}, -1)" class="w-8 h-8 bg-white border border-red-200 text-red-600 rounded-lg font-black shadow-sm">-</button>
                            <input type="number" id="h${i}" class="w-10 text-xl font-black text-center bg-transparent" value="0" readonly>
                            <button onclick="stepScore(${i}, 1)" class="w-8 h-8 bg-white border border-blue-200 text-blue-600 rounded-lg font-black shadow-sm">+</button>
                        </div>
                    </div>
                `;
                if(i <= 9) outBox.innerHTML += html;
                else inBox.innerHTML += html;
            }
        }

        // 即時監聽資料庫
        function startSync() {
            db.collection("matches").doc(matchId).onSnapshot((doc) => {
                if (doc.exists) {
                    const data = doc.data()[myName] || {};
                    const parData = doc.data().pars || {};
                    for(let i=1; i<=18; i++) {
                        document.getElementById(`h${i}`).value = data[`h${i}`] || 0;
                        if(parData[`p${i}`]) document.getElementById(`par${i}`).value = parData[`p${i}`];
                    }
                    calculateLocal();
                }
            });
        }

        function stepScore(hole, delta) {
            const input = document.getElementById(`h${hole}`);
            let newVal = Math.max(0, parseInt(input.value) + delta);
            updateFirebase(hole, newVal);
        }

        function updateFirebase(hole, scoreVal) {
            const parVal = parseInt(document.getElementById(`par${hole}`).value);
            const updateObj = {};
            updateObj[`${myName}.h${hole}`] = scoreVal !== undefined ? scoreVal : parseInt(document.getElementById(`h${hole}`).value);
            updateObj[`pars.p${hole}`] = parVal;

            db.collection("matches").doc(matchId).set(updateObj, {merge: true});
        }

        function calculateLocal() {
            let outSum = 0, inSum = 0;
            for(let i=1; i<=9; i++) outSum += parseInt(document.getElementById(`h${i}`).value) || 0;
            for(let i=10; i<=18; i++) inSum += parseInt(document.getElementById(`h${i}`).value) || 0;
            
            document.getElementById('out-sum').innerText = outSum;
            document.getElementById('in-sum').innerText = inSum;
            document.getElementById('grand-total').innerText = outSum + inSum;
        }
    </script>
</body>
</html>
